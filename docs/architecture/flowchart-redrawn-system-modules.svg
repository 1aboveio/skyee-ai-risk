<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1660" viewBox="0 0 1600 1660" role="img" aria-labelledby="title desc">
  <title id="title">基于客户流程重绘的系统模块承载图</title>
  <desc id="desc">基于客户四层风控流程重绘的系统架构图，展示需要建设的案件来源适配、案件接入、案件池、关联图谱触发、Workflow任务编排、Workflow Task Queue、Coordinator、Executor、Connector、Dashboard看板、Human Review、后续任务和反馈沉淀模块。</desc>
