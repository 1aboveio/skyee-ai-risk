name: Association Serving

on:
  pull_request:
    paths:
      - ".github/workflows/association-serving.yml"
      - "scripts/duckdb_graph_query.py"
      - "scripts/duckdb_graph_service.py"
      - "scripts/duckdb_snapshot_refresh.py"
      - "scripts/refresh_remote_graph_duckdb.sh"
      - "tests/test_duckdb_graph_service.py"
      - "tests/test_duckdb_snapshot_refresh.py"
      - "frontend/graph-demo/**"
      - "docs/adr/0006-association-inverted-index-serving.md"
      - "docs/tests/2026-06-14-association-inverted-index-serving-criteria.md"
  push:
    branches:
      - dev

jobs:
  duckdb-serving:
    name: DuckDB serving tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run service and snapshot tests
        run: |
          uv run \
            --with duckdb==1.0.0 \
            --with fastapi \
            --with httpx \
            --with pytest \
            --with typer \
            python -m pytest -q \
              tests/test_duckdb_graph_service.py \
              tests/test_duckdb_snapshot_refresh.py

  graph-demo:
    name: Graph demo checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/graph-demo
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/graph-demo/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Lint
        run: pnpm lint
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Run graph demo and workbench e2e
        run: pnpm test:e2e -- graph-demo.spec.ts workbench.spec.ts
